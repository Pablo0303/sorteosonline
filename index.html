<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo Online</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #e0f7e0; /* Color verde suave */
        }
        #names {
            font-size: 18px; /* Aumentar tamaño de fuente */
            width: 80%; /* Ancho del cuadro */
            height: 300px; /* Altura del cuadro */
        }
        #result {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
        }
        #countdown {
            font-size: 48px;
            margin-top: 20px;
        }
        .winner {
            font-family: 'Courier New', Courier, monospace; /* Fuente diferente para el ganador */
        }
        #winnerMessage {
            font-size: 36px;
            color: green; /* Color para el mensaje de ganador */
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Sorteo Online</h1>
    <textarea id="names" placeholder="Escribe los nombres, uno por línea..."></textarea><br><br>
    <button onclick="startDraw()">Empezar Sorteo</button>

    <div id="countdown"></div>
    <div id="result"></div>
    <div id="winnerMessage"></div>

    <script>
        let winnerName = ""; // Variable para almacenar el nombre del ganador

        function startDraw() {
            const names = document.getElementById('names').value.split('\n').filter(name => name.trim() !== '');
            if (names.length === 0) {
                alert('Por favor, introduce algunos nombres.');
                return;
            }

            // Elegir un ganador aleatorio
            winnerName = names[Math.floor(Math.random() * names.length)];

            let countdown = 10;
            document.getElementById('countdown').textContent = countdown;
            const countdownInterval = setInterval(() => {
                countdown--;
                document.getElementById('countdown').textContent = countdown;
                if (countdown === 0) {
                    clearInterval(countdownInterval);
                    // Mostrar el ganador con una letra alterada
                    displayWinner();
                }
            }, 1000);
        }

        function displayWinner() {
            // Modificar una letra del nombre del ganador para la elección oculta
            const winnerArray = winnerName.split('');
            const randomIndex = Math.floor(Math.random() * winnerArray.length);
            const originalLetter = winnerArray[randomIndex];
            winnerArray[randomIndex] = `<span style="font-family: 'Courier New', Courier, monospace;">${originalLetter}</span>`;
            const modifiedWinnerName = winnerArray.join('');

            // Mostrar el mensaje de ganador
            document.getElementById('result').innerHTML = `¡El ganador es: ${modifiedWinnerName}!`;
            document.getElementById('winnerMessage').textContent = '¡GANADOR!';
            document.getElementById('countdown').textContent = '';
        }
    </script>
</body>
</html>
