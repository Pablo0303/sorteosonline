
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo Online</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #808080; /* Gris normal */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #container {
            text-align: center;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        #nombres {
            width: 100%;
            height: 350px; /* Cuadro de nombres más grande */
            font-size: 18px;
            padding: 10px;
            background-color: #ffa500; /* Naranja */
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #ganador {
            font-weight: bold;
            font-size: 48px;
            color: green;
            margin-top: 20px;
            display: none; /* Al inicio no se muestra */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }
        #countdown {
            font-size: 24px;
            margin-top: 10px;
        }
        .firework {
            width: 5px;
            height: 5px;
            background-color: red;
            position: absolute;
            border-radius: 50%;
            animation: explode 10s ease-out forwards; /* Duración de 10 segundos */
        }
        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(100); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Sorteo Online</h1>
        <textarea id="nombres" placeholder="Copia los nombres aquí..."></textarea><br><br>
        <button onclick="empezarSorteo()">Empezar Sorteo</button>
        <div id="countdown"></div>
        <div id="ganador"></div>
    </div>

    <script>
        function empezarSorteo() {
            let nombres = document.getElementById('nombres').value.split('\n').filter(n => n.trim() !== '');
            let ganadorIndex = -1;

            // Buscamos si algún nombre contiene un espacio al final
            for (let i = 0; i < nombres.length; i++) {
                if (nombres[i].endsWith(' ')) { // Detectar espacio normal al final
                    ganadorIndex = i;
                    break;
                }
            }

            if (ganadorIndex === -1) {
                // Si no hay nombre marcado, selecciona un ganador al azar
                ganadorIndex = Math.floor(Math.random() * nombres.length);
            }

            // Mostrar la cuenta regresiva
            let countdown = 10;
            document.getElementById('countdown').innerText = `El sorteo empieza en: ${countdown} segundos`;

            let interval = setInterval(function() {
                countdown--;
                document.getElementById('countdown').innerText = `El sorteo empieza en: ${countdown} segundos`;
                if (countdown === 0) {
                    clearInterval(interval);
                    mostrarGanador(nombres[ganadorIndex].trim()); // Remover el espacio al final al mostrar
