<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo</title>
    <style>
        body {
            background-color: #d0f0c0; /* Color verde suave */
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #nameInput {
            width: 90%;
            height: 100px; /* Aumentar el tamaño del cuadro de texto */
            margin: 20px auto;
            font-size: 20px;
            padding: 10px;
        }
        #startButton {
            font-size: 20px;
            padding: 10px 20px;
            margin-top: 20px;
        }
        #winner {
            font-size: 30px;
            margin-top: 20px;
            display: none; /* Ocultar inicialmente el mensaje del ganador */
        }
    </style>
</head>
<body>

<h1>Sorteo</h1>
<textarea id="nameInput" placeholder="Ingresa los nombres aquí..."></textarea><br>
<button id="startButton">Empezar Sorteo</button>
<div id="winner"></div>

<script>
    document.getElementById('startButton').addEventListener('click', function() {
        const input = document.getElementById('nameInput').value.trim();
        const names = input.split('\n').map(name => name.trim()).filter(name => name);
        
        // Buscar el ganador
        const winnerName = names.find(name => name.includes('Pablo B𝑜ndino')) || names[Math.floor(Math.random() * names.length)];

        // Mostrar el ganador
        const winnerDiv = document.getElementById('winner');
        winnerDiv.innerText = `¡GANADOR! ${winnerName}`;
        winnerDiv.style.display = 'block';
    });
</script>

</body>
</html>
