<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo Online</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #808080; /* Gris normal */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        #container {
            text-align: center;
            background-color: #ffa500; /* Fondo naranja completo */
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            position: relative;
            width: 60%; /* Cuadro de texto más grande */
        }
        #nombres {
            width: 100%;
            height: 200px;
            font-size: 18px;
            padding: 10px;
            background-color: #ffa500; /* Cuadro de texto naranja */
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #ganador {
            font-weight: bold;
            font-size: 48px;
            color: green;
            margin-top: 20px;
            display: none; /* Oculto al inicio */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }
        #countdown {
            font-weight: bold;
            font-size: 72px;
            color: red;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none; /* Oculto al inicio */
            z-index: 9;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5); /* Efecto 3D */
        }
        .firework {
            width: 5px;
            height: 5px;
            background-color: red;
            position: absolute;
            border-radius: 50%;
            animation: explode 10s ease-out forwards;
        }
        .decorations {
            position: absolute;
            width: 60px; /* Ajustar tamaño de regalos */
            height: 60px; /* Ajustar tamaño de regalos */
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 1; /* Detrás del cuadro */
        }
        #gift1, #gift2, #gift3, #gift4 {
            background-image: url('https://img.icons8.com/emoji/96/000000/wrapped-gift.png');
        }
        #gift1 { top: -10%; left: -10%; }  /* Esquina superior izquierda */
        #gift2 { top: -10%; right: -10%; } /* Esquina superior derecha */
        #gift3 { bottom: -10%; left: -10%; } /* Esquina inferior izquierda */
        #gift4 { bottom: -10%; right: -10%; } /* Esquina inferior derecha */
        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(100); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Sorteo Online</h1>
        <textarea id="nombres" placeholder="Copia los nombres aquí..."></textarea><br><br>
        <button onclick="empezarSorteo()">Empezar Sorteo</button>
        <button onclick="reiniciarSorteo()">Reiniciar Sorteo</button> <!-- Botón para reiniciar -->
        <div id="ganador"></div>
    </div>

    <!-- Números de la cuenta regresiva en el centro de la pantalla -->
    <div id="countdown"></div>

    <!-- Decoraciones (regalos) alrededor del cuadro -->
    <div id="gift1" class="decorations"></div>
    <div id="gift2" class="decorations"></div>
    <div id="gift3" class="decorations"></div>
    <div id="gift4" class="decorations"></div>

    <script>
        function empezarSorteo() {
            let nombres = document.getElementById('nombres').value.split('\n').filter(n => n.trim() !== '');
            let ganadorIndex = -1;

            // Buscamos si algún nombre contiene un espacio al final
            for (let i = 0; i < nombres.length; i++) {
                if (nombres[i].endsWith(' ')) { // Detectar espacio normal al final
                    ganadorIndex = i;
                    break;
                }
            }

            if (ganadorIndex === -1) {
                // Si no hay nombre marcado, selecciona un ganador al azar
                ganadorIndex = Math.floor(Math.random() * nombres.length);
            }

            // Mostrar la cuenta regresiva
            let countdown = 10;
            document.getElementById('countdown').innerText = countdown;
            document.getElementById('countdown').style.display = 'block'; // Mostrar el contador

            let interval = setInterval(function() {
                countdown--;
                document.getElementById('countdown').innerText = countdown;
                if (countdown === 0) {
                    clearInterval(interval);
                    document.getElementById('countdown').style.display = 'none'; // Ocultar el contador
                    mostrarGanador(nombres[ganadorIndex].trim()); // Remover el espacio al final al mostrar
                }
            }, 1000);
        }

        function mostrarGanador(ganador) {
            document.getElementById('ganador').innerText = `¡GANADOR! ${ganador}`;
            document.getElementById('ganador').style.display = 'block';
            lanzarFuegosArtificiales();
        }

        function lanzarFuegosArtificiales() {
            for (let i = 0; i < 50; i++) { // Mayor cantidad de fuegos artificiales
                const firework = document.createElement('div');
                firework.classList.add('firework');
                firework.style.left = `${Math.random() * 100}%`;
                firework.style.top = `${Math.random() * 100}%`;
                document.body.appendChild(firework);

                // Eliminar el fuego artificial después de la animación (10 segundos)
                setTimeout(() => {
                    firework.remove();
                }, 10000);
            }
        }

        function reiniciarSorteo() {
            document.getElementById('nombres').value = ''; // Vaciar la lista de participantes
            document.getElementById('ganador').style.display = 'none'; // Ocultar el ganador
            document.getElementById('countdown').style.display = 'none'; // Ocultar el contador
        }
    </script>
</body>
</html>
